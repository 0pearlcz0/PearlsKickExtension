<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pearl's Kick Stats</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0d0d0d;
      --bg2: #1a1a1a;
      --bg3: #242424;
      --text: #e8e8e8;
      --text-dim: #a0a0a0;
      --kick: #53fc18;
      --border: #2a2a2a;
      --red: #ff4444;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    /* Login */
    .login-view {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 20px;
    }
    
    .login-box {
      background: var(--bg2);
      padding: 40px;
      border-radius: 12px;
      border: 1px solid var(--border);
      width: 100%;
      max-width: 400px;
    }
    
    .login-box h1 {
      color: var(--kick);
      margin-bottom: 10px;
      font-size: 24px;
    }
    
    .login-box p {
      color: var(--text-dim);
      margin-bottom: 20px;
      font-size: 14px;
    }
    
    input {
      width: 100%;
      padding: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      font-family: monospace;
    }
    
    input:focus {
      outline: none;
      border-color: var(--kick);
    }
    
    button {
      width: 100%;
      padding: 12px;
      background: var(--kick);
      color: #000;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      font-size: 14px;
    }
    
    button:hover {
      opacity: 0.9;
    }
    
    .error {
      color: var(--red);
      font-size: 12px;
      margin-top: 8px;
    }
    
    /* Dashboard */
    .dashboard-view {
      display: none;
    }
    
    .dashboard-view.active {
      display: block;
    }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 30px;
    }
    
    header h1 {
      color: var(--kick);
      font-size: 28px;
    }
    
    .refresh-btn {
      width: auto;
      padding: 10px 20px;
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }
    
    .refresh-btn:hover {
      background: var(--bg2);
      opacity: 1;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: var(--bg2);
      padding: 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    
    .stat-card h3 {
      color: var(--text-dim);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    
    .stat-card .value {
      font-size: 32px;
      font-weight: 700;
      color: var(--kick);
    }
    
    .chart-container {
      background: var(--bg2);
      padding: 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-bottom: 30px;
    }
    
    .chart-container h2 {
      margin-bottom: 20px;
      font-size: 18px;
    }
    
    .mutes-section h2 {
      margin-bottom: 20px;
      font-size: 18px;
    }
    
    .mute-incident {
      background: var(--bg2);
      padding: 20px;
      border-radius: 8px;
      border: 1px solid var(--red);
      margin-bottom: 20px;
    }
    
    .mute-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
    }
    
    .mute-time {
      color: var(--red);
      font-weight: 600;
    }
    
    .messages-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    
    .messages-box {
      background: var(--bg3);
      padding: 15px;
      border-radius: 6px;
    }
    
    .messages-box h4 {
      margin-bottom: 10px;
      font-size: 14px;
      color: var(--text-dim);
    }
    
    .message {
      padding: 8px;
      background: var(--bg);
      border-radius: 4px;
      margin-bottom: 6px;
      font-size: 13px;
    }
    
    .message .time {
      color: var(--text-dim);
      font-size: 11px;
      margin-right: 8px;
    }
    
    .message .username {
      color: var(--kick);
      font-weight: 600;
      margin-right: 8px;
    }
    
    .message .type {
      color: var(--kick);
      font-size: 11px;
      font-weight: 600;
      margin-right: 8px;
    }
  </style>
</head>
<body>

<!-- LOGIN VIEW -->
<div class="login-view" id="loginView">
  <div class="login-box">
    <h1>Pearl's Kick Stats</h1>
    <p>Enter your stats token to view your dashboard</p>
    <input type="text" id="tokenInput" placeholder="Enter your 20-character token">
    <button id="loginBtn">View Dashboard</button>
    <div class="error" id="loginError"></div>
  </div>
</div>

<!-- DASHBOARD VIEW -->
<div class="dashboard-view" id="dashboardView">
  <div class="container">
    <header>
      <h1>Pearl's Kick Stats</h1>
      <button class="refresh-btn" id="refreshBtn">🔄 Refresh</button>
    </header>
    
    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Messages</h3>
        <div class="value" id="totalMessages">0</div>
      </div>
      <div class="stat-card">
        <h3>Last 24 Hours</h3>
        <div class="value" id="messages24h">0</div>
      </div>
      <div class="stat-card">
        <h3>Last 7 Days</h3>
        <div class="value" id="messages7d">0</div>
      </div>
      <div class="stat-card">
        <h3>Last 30 Days</h3>
        <div class="value" id="messages30d">0</div>
      </div>
      <div class="stat-card">
        <h3>Total Mutes</h3>
        <div class="value" id="muteCount" style="color: var(--red)">0</div>
      </div>
    </div>
    
    <!-- Hourly Chart -->
    <div class="chart-container">
      <h2>Messages (Last 24 Hours)</h2>
      <canvas id="hourlyChart"></canvas>
    </div>
    
    <!-- Type Breakdown -->
    <div class="chart-container">
      <h2>Messages by Type</h2>
      <canvas id="typeChart"></canvas>
    </div>
    
    <!-- Mute Incidents -->
    <div class="mutes-section">
      <h2>Recent Mute Incidents</h2>
      <div id="mutesList"></div>
    </div>
  </div>
</div>

<script>
const API_URL = 'http://localhost:8000'; // Change to your server URL

let currentToken = null;
let hourlyChart = null;
let typeChart = null;

// Elements
const loginView = document.getElementById('loginView');
const dashboardView = document.getElementById('dashboardView');
const tokenInput = document.getElementById('tokenInput');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');
const refreshBtn = document.getElementById('refreshBtn');

// Login
loginBtn.addEventListener('click', login);
tokenInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') login();
});

async function login() {
  const token = tokenInput.value.trim();
  if (!token) {
    loginError.textContent = 'Please enter a token';
    return;
  }
  
  loginError.textContent = '';
  
  try {
    const response = await fetch(`${API_URL}/api/stats/${token}`);
    if (!response.ok) {
      throw new Error('Token not found');
    }
    
    currentToken = token;
    loginView.style.display = 'none';
    dashboardView.classList.add('active');
    loadDashboard();
  } catch (error) {
    loginError.textContent = 'Invalid token or server error';
  }
}

// Load Dashboard
async function loadDashboard() {
  if (!currentToken) return;
  
  try {
    const response = await fetch(`${API_URL}/api/stats/${currentToken}`);
    const data = await response.json();
    
    // Update stats
    document.getElementById('totalMessages').textContent = data.total_messages.toLocaleString();
    document.getElementById('messages24h').textContent = data.messages_24h.toLocaleString();
    document.getElementById('messages7d').textContent = data.messages_7d.toLocaleString();
    document.getElementById('messages30d').textContent = data.messages_30d.toLocaleString();
    document.getElementById('muteCount').textContent = data.mute_count.toLocaleString();
    
    // Hourly Chart
    updateHourlyChart(data.hourly_chart);
    
    // Type Chart
    updateTypeChart(data.by_type);
    
    // Mutes
    renderMutes(data.recent_mutes);
    
  } catch (error) {
    console.error('Failed to load dashboard:', error);
  }
}

function updateHourlyChart(data) {
  const ctx = document.getElementById('hourlyChart');
  
  if (hourlyChart) hourlyChart.destroy();
  
  hourlyChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.map(d => d.hour),
      datasets: [{
        label: 'Messages',
        data: data.map(d => d.count),
        borderColor: '#53fc18',
        backgroundColor: 'rgba(83, 252, 24, 0.1)',
        tension: 0.3,
        fill: true
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: {
          beginAtZero: true,
          ticks: { color: '#a0a0a0' },
          grid: { color: '#2a2a2a' }
        },
        x: {
          ticks: { color: '#a0a0a0' },
          grid: { color: '#2a2a2a' }
        }
      }
    }
  });
}

function updateTypeChart(byType) {
  const ctx = document.getElementById('typeChart');
  
  if (typeChart) typeChart.destroy();
  
  const labels = Object.keys(byType);
  const values = Object.values(byType);
  
  typeChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: labels.map(l => l.replace('_', ' ')),
      datasets: [{
        data: values,
        backgroundColor: ['#53fc18', '#00d9ff', '#ff6b6b', '#ffd93d']
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: '#e8e8e8' }
        }
      }
    }
  });
}

function renderMutes(mutes) {
  const container = document.getElementById('mutesList');
  
  if (!mutes.length) {
    container.innerHTML = '<p style="color: var(--text-dim)">No mute incidents recorded</p>';
    return;
  }
  
  container.innerHTML = mutes.map(mute => `
    <div class="mute-incident">
      <div class="mute-header">
        <div class="mute-time">🚫 ${new Date(mute.timestamp).toLocaleString()}</div>
      </div>
      <div class="messages-section">
        <div class="messages-box">
          <h4>Last 10 Chat Messages</h4>
          ${mute.chat_before.map(msg => `
            <div class="message">
              <span class="time">${new Date(msg.timestamp).toLocaleTimeString()}</span>
              <span class="username">${msg.username}:</span>
              ${msg.text}
            </div>
          `).join('')}
        </div>
        <div class="messages-box">
          <h4>My Last 10 Messages</h4>
          ${mute.my_before.map(msg => `
            <div class="message">
              <span class="time">${new Date(msg.timestamp).toLocaleTimeString()}</span>
              <span class="type">[${msg.type}]</span>
              ${msg.text}
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

refreshBtn.addEventListener('click', loadDashboard);
</script>

</body>
</html>
